<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Number Flash</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    color: #fff;
    font-family: system-ui, sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .controls {
    padding: 14px 16px 10px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-shrink: 0;
    border-bottom: 1px solid #222;
    flex-wrap: wrap;
  }

  .control {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: #aaa;
  }

  input[type=number] {
    width: 60px;
    background: #111;
    color: #fff;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 0.9rem;
    font-family: inherit;
    text-align: center;
  }

  input[type=number]:focus { outline: 1px solid #888; }

  .arena {
    flex: 1;
    position: relative;
  }

  .num {
    position: absolute;
    font-size: 2.4rem;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translate(-50%, -50%);
  }

  .num.correct { color: #4ade80; pointer-events: none; }
  .num.wrong   { color: #f87171; }

  .bottom {
    padding: 12px 16px 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-shrink: 0;
  }

  button {
    background: #fff;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }

  button:disabled { background: #333; color: #666; cursor: default; }

  #status { font-size: 0.9rem; color: #aaa; }
  #status.err { color: #f87171; }
  #status.ok  { color: #4ade80; }
</style>
</head>
<body>

<div class="controls">
  <div class="control">
    Count:
    <input type="number" id="cInput" min="3" max="20" value="6">
  </div>
  <div class="control">
    Show time (s):
    <input type="number" id="tInput" min="0.5" max="10" value="1.5" step="0.25">
  </div>
</div>

<div class="arena" id="arena"></div>

<div class="bottom">
  <button id="startBtn">Start</button>
  <div id="status">Press Start</div>
</div>

<script>
  const arena    = document.getElementById('arena');
  const startBtn = document.getElementById('startBtn');
  const status   = document.getElementById('status');
  const cInput   = document.getElementById('cInput');
  const tInput   = document.getElementById('tInput');

  let next = 1, total = 0, phase = 'idle';

  function setStatus(msg, cls = '') {
    status.textContent = msg;
    status.className = cls;
  }

  function clamp(val, min, max) { return Math.min(max, Math.max(min, val)); }

  function getCount() { return clamp(parseInt(cInput.value) || 6, 3, 50); }
  function getDur()   { return clamp(parseFloat(tInput.value) || 1.5, 0.1, 60) * 1000; }

  function randomPositions(n, w, h) {
    const pad = 40, margin = 70, positions = [];
    let attempts = 0;
    while (positions.length < n && attempts < 5000) {
      attempts++;
      const x = pad + Math.random() * (w - pad * 2);
      const y = pad + Math.random() * (h - pad * 2);
      if (positions.every(p => Math.hypot(p.x - x, p.y - y) > margin))
        positions.push({x, y});
    }
    return positions;
  }

  async function start() {
    phase = 'showing';
    startBtn.disabled = true;
    next = 1;
    arena.innerHTML = '';

    total = getCount();
    const dur = getDur();
    const {width: w, height: h} = arena.getBoundingClientRect();
    const positions = randomPositions(total, w, h);

    setStatus('Memorise...');

    const els = positions.map((p, i) => {
      const div = document.createElement('div');
      div.className = 'num';
      div.textContent = i + 1;
      div.style.left = p.x + 'px';
      div.style.top  = p.y + 'px';
      div.dataset.n  = i + 1;
      arena.appendChild(div);
      return div;
    });

    await new Promise(r => setTimeout(r, dur));

    els.forEach(el => el.textContent = '?');
    phase = 'guessing';
    setStatus(`Tap: 1 of ${total}`);

    els.forEach(el => el.addEventListener('click', () => {
      if (phase !== 'guessing') return;
      const n = parseInt(el.dataset.n);

      if (n === next) {
        el.textContent = n;
        el.classList.add('correct');
        next++;
        if (next > total) {
          phase = 'idle';
          setStatus('Done!', 'ok');
          startBtn.disabled = false;
        } else {
          setStatus(`Tap: ${next} of ${total}`);
        }
      } else {
        el.textContent = n;
        el.classList.add('wrong');
        setStatus(`Wrong! Needed ${next}`, 'err');
        phase = 'reveal';
        setTimeout(() => {
          els.forEach(e => {
            if (!e.classList.contains('correct')) e.textContent = e.dataset.n;
          });
          phase = 'idle';
          startBtn.disabled = false;
          setStatus('Press Start to retry');
        }, 800);
      }
    }));
  }

  startBtn.onclick = start;
</script>
</body>
</html>
